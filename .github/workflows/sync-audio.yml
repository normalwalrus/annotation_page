name: Sync audio from Google Drive

on:
  workflow_dispatch: {} # run it from the Actions tab after adding clips to Drive

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download clips and regenerate manifest
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: node tools/sync_audio.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio manifest.json
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Sync audio from Drive"
          git push
